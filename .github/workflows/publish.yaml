name: publish
on:
  workflow_run:
    workflows: ['release']
    types:
      - completed
jobs:
  capture-release-notes:
    runs-on: ubuntu-22.04
    outputs:
      RELEASE_NOTES: ${{ steps.set-output.outputs.RELEASE_NOTES }}
    steps:
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: install frontend dependencies
        run: pnpm install

      - name: capture release notes
        run: |
          RELEASE_NOTES=$(pnpm semantic-release --dry-run --branches | sed -n '/^##/,$p')
          echo "RELEASE_NOTES=${RELEASE_NOTES}" >> $GITHUB_ENV

      - name: set step output
        id: set-output
        run: |
          echo "RELEASE_NOTES=${RELEASE_NOTES}" >> $GITHUB_OUTPUT

  publish-app:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-latest' # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    env:
      PKG_CONFIG_PATH: "${{ matrix.platform == 'ubuntu-latest' && /usr/local/lib:/usr/lib/x86_64-linux-gnu:/usr/share || ''}}"

    needs: capture-release-notes

    steps:
      - uses: actions/checkout@v4

      - name: Update system repositories
        if: matrix.platform == 'ubuntu-latest' # This must match the platform value defined above.
        run: |
          sudo apt-get update

      - name: Install system dependencies
        if: matrix.platform == 'ubuntu-latest' # This must match the platform value defined above.
        run: |
          sudo apt-get install -y \
              curl wget unzip \
              build-essential cmake pkg-config \
              libgtk-3-dev libgdk-pixbuf2.0-dev \
              libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
              libsoup-3.0-dev \
              libclang-dev clang \
              libssl-dev libxdo-dev file\
              libavutil-dev libavformat-dev libavfilter-dev \
              libavdevice-dev \
              libayatana-appindicator3-dev librsvg2-dev \
              libx11-dev libxcb1-dev libx11-xcb-dev libxcomposite-dev \
              libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev \
              libxi-dev libxrandr-dev libxrender-dev libxtst-dev \
              libasound2-dev libudev-dev libfreetype6-dev zlib1g-dev \
              libnss3-dev libxss-dev libdbus-1-dev libxkbcommon-dev \
              fuse libfuse2 desktop-file-utils xdg-utils

      - name: Install system dependencies
        if: matrix.platform == 'macos-latest' # This must match the platform value defined above.
        run: |
          brew install pkg-config ffmpeg

      - name: Install LinuxDeploy
        if: matrix.platform == 'ubuntu-latest' # This must match the platform value defined above.
        uses: miurahr/install-linuxdeploy-action@v1
        with:
          plugins: gstreamer appimage
          dir: /usr/local/bin

      - name: Cache vcpkg
        if: matrix.platform == 'windows-latest' # This must match the platform value defined above.
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg
          key: vcpkg-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yaml') }}
          restore-keys: |
            vcpkg-${{ runner.os }}

      - name: Install system dependencies
        if: matrix.platform == 'windows-latest' # This must match the platform value defined above.
        run: |
          choco install -y nsis nodejs-lts ffmpeg pkgconfiglite

      - name: Install vcpkg and ffmpeg
        if: matrix.platform == 'windows-latest' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          cd C:\vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg integrate install
          .\vcpkg install ffmpeg:x64-windows

      - name: Set env variables
        if: matrix.platform == 'windows-latest' # This must match the platform value defined above.
        run: |
          echo "VCPKG_ROOT=C:\\vcpkg" >> $GITHUB_ENV
          echo "C:\\vcpkg" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=C:\\vcpkg\\installed\\x64-windows\\lib\\pkgconfig" >> $GITHUB_ENV

      - name: Set up Python
        if: matrix.platform == 'windows-latest' # This must match the platform value defined above.
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ (matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin') || (matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc') || '' }}

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: donkidunk-v__VERSION__
          releaseName: 'Donkidunk v__VERSION__'
          releaseBody: ${{ needs.capture-release-notes.outputs.RELEASE_NOTES }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
