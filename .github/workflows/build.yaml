name: build
on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev build-essential libssl-dev
          version: 1.0

      - name: Install minimal system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - uses: pnpm/action-setup@v4
        with:
          run_install: false # Do not install automatically

      - name: Cache node_modules
        uses: actions/cache@v4
        id: pnpm-cache
        with:
          path: node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.pnpm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-test
          workspaces: src-tauri
          cache-on-failure: true

      - name: Check types
        run: pnpm check

      # Lint frontend (with cache)
      - name: Lint frontend
        run: pnpm lint --cache --cache-location=.eslintcache

      - name: Test frontend
        run: pnpm test

      - name: Test backend
        working-directory: ./src-tauri
        run: cargo test --tests --no-fail-fast

  # Build jobs per platform
  build-multiplatform:
    needs: test-ubuntu
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            rust-target: ''
            args: ''
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ''
          - platform: macos-latest
            rust-target: 'aarch64-apple-darwin,x86_64-apple-darwin'
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            rust-target: 'aarch64-apple-darwin,x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      # System dependencies (conditional per platform)
      - name: Update repos (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: sudo apt-get update

      - name: Cache apt packages (Linux)
        if: matrix.platform == 'ubuntu-latest'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          version: 1.0

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install LinuxDeploy (Linux)
        if: matrix.platform == 'ubuntu-latest'
        uses: miurahr/install-linuxdeploy-action@v1
        with:
          plugins: gstreamer appimage
          dir: /usr/local/bin

      - name: Cache WebView2 (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        id: webview2-cache
        with:
          path: WebView2Installer.exe
          key: webview2-installer

      - name: Install WebView2 (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          if (!(Test-Path "WebView2Installer.exe")) {
            Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "WebView2Installer.exe"
          }
          Start-Process -FilePath WebView2Installer.exe -ArgumentList "/silent /install" -NoNewWindow -Wait

      # Node setup
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@v4
        id: pnpm-cache
        with:
          path: node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Rust setup
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
          components: rustfmt, clippy

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.platform }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          workspaces: src-tauri
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Format check (fast)
      - name: Format check
        working-directory: ./src-tauri
        run: cargo fmt --check --quiet

      # Build with integrated clippy (saves recompilation)
      - name: Build and lint
        env:
          GENERATE_SOURCEMAP: false
        run: |
          cd src-tauri
          cargo clippy --profile ci ${{ matrix.args }} -- -D warnings
          cd ..
          pnpm tauri build ${{ matrix.args }} -- --profile ci

      - name: Upload artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/
          retention-days: 5
