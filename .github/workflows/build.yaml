name: build
on:
  pull_request:
jobs:
  linux:
    name: Linux - Build, test and lint
    runs-on: ubuntu-latest
    container: jrottenberg/ffmpeg:7.1-ubuntu2404
    env:
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu
      LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
      INCLUDE_PATH: /usr/lib/x86_64-linux-gnu
    steps:
      - uses: actions/checkout@v2
      - name: Install system dependencies
        run: |
          apt update
          apt upgrade -y
          apt install -y --no-install-recommends \
            ca-certificates curl clang \
            pkg-config libglib2.0-dev \
            libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev build-essential
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.3'
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: true
      - name: Test frontend
        run: |
          pnpm test
      - name: Lint frontend
        run: |
          pnpm lint
      - name: Test backend
        working-directory: ./src-tauri
        run: |
          cargo test
      - name: Lint backend
        working-directory: ./src-tauri
        run: |
          cargo clippy -- -D warnings
      - name: Format backend
        working-directory: ./src-tauri
        run: |
          cargo fmt -- --check
      - name: Build project
        run: |
          pnpm tauri build
