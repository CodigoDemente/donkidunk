name: build
on:
  pull_request:
jobs:
  linux:
    name: Linux - Build, test and lint
    runs-on: ubuntu-latest
    env:
      PKG_CONFIG_PATH: /usr/local/lib:/usr/lib/x86_64-linux-gnu:/usr/share
    steps:
      - uses: actions/checkout@v2
      - name: Update system repositories
        run: |
          sudo apt-get update
      - name: Install system dependencies
        run: |
          sudo apt-get install -y \
              curl wget unzip \
              build-essential cmake pkg-config \
              libgtk-3-dev libgdk-pixbuf2.0-dev \
              libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
              libsoup-3.0-dev \
              libclang-dev clang \
              libssl-dev libxdo-dev file\
              libavutil-dev libavformat-dev libavfilter-dev \
              libavdevice-dev \
              libayatana-appindicator3-dev librsvg2-dev \
              libx11-dev libxcb1-dev libx11-xcb-dev libxcomposite-dev \
              libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev \
              libxi-dev libxrandr-dev libxrender-dev libxtst-dev \
              libasound2-dev libudev-dev libfreetype6-dev zlib1g-dev \
              libnss3-dev libxss-dev libdbus-1-dev libxkbcommon-dev \
              fuse libfuse2 desktop-file-utils xdg-utils
      - name: Install LinuxDeploy
        uses: miurahr/install-linuxdeploy-action@v1
        with:
          plugins: gstreamer appimage
          dir: /usr/local/bin
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          run_install: true
      - name: Install dependencies
        run: |
          pnpm install
      - name: Test frontend
        run: |
          pnpm test
      - name: Lint frontend
        run: |
          pnpm lint
      - name: Test backend
        working-directory: ./src-tauri
        run: |
          cargo test
      - name: Lint backend
        working-directory: ./src-tauri
        run: |
          cargo clippy -- -D warnings
      - name: Format backend
        working-directory: ./src-tauri
        run: |
          cargo fmt -- --check
      - name: Build project
        run: |
          pnpm tauri build
  macos:
    name: MacOS - Build, test and lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install system dependencies
        run: |
          brew install pkg-config ffmpeg
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          run_install: true
      - name: Test frontend
        run: |
          pnpm test
      - name: Lint frontend
        run: |
          pnpm lint
      - name: Build project
        run: |
          pnpm tauri build
      - name: Test backend
        working-directory: ./src-tauri
        run: |
          cargo test
      - name: Lint backend
        working-directory: ./src-tauri
        run: |
          cargo clippy -- -D warnings
      - name: Format backend
        working-directory: ./src-tauri
        run: |
          cargo fmt -- --check
  windows:
    name: Windows - Build, test and lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Cache vcpkg
        uses: actions/cache@v3
        with:
          path: C:\vcpkg
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}
      - name: Install vcpkg and ffmpeg
        run: |
          if (-Not (Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            cd C:\vcpkg
            .\bootstrap-vcpkg.bat
            .\vcpkg integrate install
          }
          .\vcpkg install ffmpeg:x64-windows --binarysource=clear;nuget,GitHub,readwrite
          echo "VCPKG_ROOT=C:\\vcpkg" >> $GITHUB_ENV
          echo "C:\\vcpkg" >> $GITHUB_PATH
      - name: Set PKG_CONFIG_PATH
        run: |
          echo "PKG_CONFIG_PATH=C:\\vcpkg\\installed\\x64-windows\\lib\\pkgconfig" >> $GITHUB_ENV
      - name: Install system dependencies
        run: |
          choco install -y nsis nodejs-lts pkgconfiglite
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true
      - name: Install dependencies
        run: |
          pnpm install
      - name: Test frontend
        run: |
          pnpm test
      - name: Lint frontend
        run: |
          pnpm lint
      - name: Install WebView2
        run: |
          Remove-Item -Path WebView2Installer.exe -ErrorAction Ignore
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "WebView2Installer.exe"
          if (Test-Path "WebView2Installer.exe") {
            Start-Process -FilePath WebView2Installer.exe -ArgumentList "/silent /install" -NoNewWindow -Wait
          } else {
            echo "Failed to download WebView2 installer"
            exit 1
          }
      - name: Test backend
        working-directory: ./src-tauri
        run: |
          cargo test
      - name: Lint backend
        working-directory: ./src-tauri
        run: |
          cargo clippy -- -D warnings
      - name: Format backend
        working-directory: ./src-tauri
        run: |
          cargo fmt -- --check
      - name: Build project
        run: |
          pnpm tauri build
