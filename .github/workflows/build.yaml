name: build
on:
  pull_request:
jobs:
  linux:
    name: Linux - Build, test and lint
    runs-on: ubuntu-latest
    container: codigodemente/donkidunk-builder:latest
    steps:
      - uses: actions/checkout@v2
      - name: Install dependencies
        run: |
          pnpm install
      - name: Test frontend
        run: |
          pnpm test
      - name: Lint frontend
        run: |
          pnpm lint
      - name: Test backend
        working-directory: ./src-tauri
        run: |
          cargo test
      - name: Lint backend
        working-directory: ./src-tauri
        run: |
          cargo clippy -- -D warnings
      - name: Format backend
        working-directory: ./src-tauri
        run: |
          cargo fmt -- --check
      - name: Build project
        run: |
          pnpm tauri build --bundles deb
